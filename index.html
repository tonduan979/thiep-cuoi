<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Canva Thiệp cưới</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<style>
body {
  text-align: center;
  background: pink;
  font-family: sans-serif;
}

canvas {
  border: 2px solid #fff;
  margin-top: 20px;
}

.controls {
  margin-top: 15px;
}

button, input {
  margin: 5px;
  padding: 8px;
}
</style>
</head>

<body>

<h2>💌 Thiết kế thiệp cưới (Mini Canva)</h2>

<div class="controls">
  <button onclick="addText()">Thêm chữ</button>
  <input type="color" onchange="changeColor(this.value)">
  <input type="file" onchange="addImage(event)">
  <button onclick="download()">Tải ảnh</button>
</div>

<canvas id="canvas" width="400" height="600"></canvas>

<script src="script.js"></script>
</body>
</html>
