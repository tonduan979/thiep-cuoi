<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp cưới</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  overflow-x: hidden;
  background: linear-gradient(#fff, #ffeef2);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 50px;
  color: #c2185b;
  animation: fadeIn 2s ease;
}

p {
  font-size: 20px;
}

/* SECTION */
.section {
  padding: 60px 20px;
  animation: fadeUp 1.5s ease;
}

/* ẢNH */
img {
  width: 250px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.1);
}

/* NÚT */
button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  background: #c2185b;
  color: white;
  cursor: pointer;
}

/* VẼ KHỐI */
.box {
  width: 100px;
  height: 100px;
  border: 3px solid #c2185b;
  margin: 20px auto;
}

/* HOA RƠI */
.flower {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeUp {
  from {opacity: 0; transform: translateY(40px);}
  to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1 contenteditable="true">Tỵ Cần & Ngọc Linh</h1>
  <p contenteditable="true">10.05.2026</p>
</div>

<!-- ẢNH -->
<div class="section">
  <h2 contenteditable="true">Ảnh cưới</h2>
  <img src="https://picsum.photos/300/400" onclick="changeImg(this)">
</div>

<!-- THÔNG TIN -->
<div class="section">
  <h2 contenteditable="true">Thông tin</h2>
  <p contenteditable="true">Địa điểm: Hà Tĩnh</p>
</div>

<!-- VẼ KHỐI -->
<div class="section">
  <h2>Trang trí</h2>
  <div class="box"></div>
</div>

<!-- NÚT -->
<button onclick="addFlower()">Bật hoa rơi 🌸</button>
<button onclick="stopFlower()">Tắt hoa</button>

<script>

// ĐỔI ẢNH
function changeImg(img) {
  let link = prompt("Dán link ảnh:");
  if (link) img.src = link;
}

// HOA RƠI
let flowerInterval;

function addFlower() {
  flowerInterval = setInterval(() => {
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = "🌸";
    f.style.left = Math.random() * 100 + "vw";
    f.style.animationDuration = (3 + Math.random()*5) + "s";
    document.body.appendChild(f);

    setTimeout(() => f.remove(), 8000);
  }, 300);
}

function stopFlower() {
  clearInterval(flowerInterval);
}

</script>

</body>
</html>
