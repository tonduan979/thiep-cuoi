<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thiệp Cưới</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">
</head>

<body>

<!-- NHẠC -->
<audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<section class="hero">
  <h1 id="names"></h1>
  <p id="date"></p>
</section>

<!-- ẢNH -->
<section class="section">
  <img id="mainImg">
</section>

<!-- THÔNG TIN -->
<section class="section">
  <h2>Thông tin lễ cưới</h2>
  <p id="location"></p>
</section>

<!-- MAP -->
<section class="section">
  <iframe id="map"
    width="80%" height="300"
    style="border:0;"
    loading="lazy">
  </iframe>
</section>

<script src="script.js"></script>

</body>
</html>
